version: "3.8"

services:
  nexus-crm:
    image: nexus-crm:latest
    networks:
      - iapadilhaNet
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=postgresql://postgres:98e4b91c441af09d6afa7789c6624ae7@postgres:5432/nexus_crm
      - AUTH_SECRET=nexus-crm-secret-key-change-in-production-2026
      - AUTH_URL=https://crm.nexusinovacoesimobiliarias.com.br
      - AUTH_TRUST_HOST=true
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.nexuscrm.rule=Host(`crm.nexusinovacoesimobiliarias.com.br`)
        - traefik.http.routers.nexuscrm.entrypoints=websecure
        - traefik.http.routers.nexuscrm.tls.certresolver=letsencryptresolver
        - traefik.http.routers.nexuscrm.service=nexuscrm
        - traefik.http.routers.nexuscrm.priority=10
        - traefik.http.services.nexuscrm.loadbalancer.server.port=3000
        - traefik.http.services.nexuscrm.loadbalancer.passHostHeader=true
      resources:
        limits:
          cpus: "1"
          memory: 512M

networks:
  iapadilhaNet:
    external: true
